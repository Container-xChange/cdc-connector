# fly.toml app configuration file generated for cdc-connector on 2025-12-17T16:48:22+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cdc-connector'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  TZ = "UTC"
  ENABLE_JMX_EXPORTER = "true"
  OFFSET_FLUSH_TIMEOUT_MS = "60000"
  KAFKA_HEAP_OPTS = "-Xms2G -Xmx5G"

[http_service]
  internal_port = 8083
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[services]]
  protocol = "tcp"
  internal_port = 9404

  [[services.ports]]
    port = 9443
    handlers = ["tls", "http"]

[mounts]
  source = "cdc_data"
  destination = "/data"

[[vm]]
  memory_mb = 8192
  cpus = 4
