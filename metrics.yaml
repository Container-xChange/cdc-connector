lowercaseOutputName: true
lowercaseOutputLabelNames: true

rules:
  # Debezium connector metrics (snapshot / streaming / schema-history)
  - pattern: 'debezium.([^<]+)<type=connector-metrics, context=([^,]+), server=([^,>]+)><>([^:]+)'
    name: debezium_$1_$2_$4
    labels:
      server: "$3"
    type: GAUGE

  # Kafka Connect framework metrics
  - pattern: 'kafka.connect<type=source-task-metrics, connector=([^,]+), task=([^>]+)><>([^:]+)'
    name: kafka_connect_source_task_$3
    labels:
      connector: "$1"
      task: "$2"
    type: GAUGE
  - pattern: 'kafka.connect<type=sink-task-metrics, connector=([^,]+), task=([^>]+)><>([^:]+)'
    name: kafka_connect_sink_task_$3
    labels:
      connector: "$1"
      task: "$2"
    type: GAUGE
  - pattern: 'kafka.connect<type=connector-task-metrics, connector=([^,]+), task=([^>]+)><>(status|pause-ratio|offset-commit-success-percentage|offset-commit-failure-percentage|offset-commit-avg-time-ms|offset-commit-max-time-ms)'
    name: kafka_connect_task_$3
    labels:
      connector: "$1"
      task: "$2"
    type: GAUGE
  - pattern: 'kafka.connect<type=connect-worker-metrics><>([^:]+)'
    name: kafka_connect_worker_$1
    type: GAUGE

  # Kafka producer (snapshot throughput + latency to MSK)
  - pattern: 'kafka.producer<type=producer-metrics, client-id=([^>]+)><>(record-send-rate|record-error-rate|outgoing-byte-rate|batch-size-avg|request-latency-avg|request-latency-max|buffer-available-bytes|records-per-request-avg)'
    name: kafka_producer_$2
    labels:
      client_id: "$1"
    type: GAUGE
